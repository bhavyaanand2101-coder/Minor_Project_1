<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PathFinder AI | Research Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12">
            <h1 class="text-5xl font-extrabold gradient-text">PathFinder AI</h1>
            <p class="text-gray-400 mt-2">Prescriptive Academic Success & Recovery Engine</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <!-- INPUT CARD -->
            <div class="glass p-8 rounded-3xl">
                <h2 class="text-2xl font-bold mb-6">Diagnostic Input</h2>
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <select id="degree" class="bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none">
                            <option value="B.Tech">B.Tech (Engineering)</option>
                            <option value="MBA">MBA (Management)</option>
                        </select>
                        <select id="subject" class="bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none">
                            <option value="Data Structures">Major Subject 1</option>
                            <option value="Mathematics">Major Subject 2</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="text-sm text-gray-400">Attendance (%): <span id="attLabel">75</span></label>
                        <input type="range" id="attendance" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer" oninput="attLabel.innerText=this.value">
                    </div>

                    <div>
                        <label class="text-sm text-gray-400">Study Hours/Week: <span id="hrsLabel">10</span></label>
                        <input type="range" id="study" max="20" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer" oninput="hrsLabel.innerText=this.value">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="g1" placeholder="Midterm 1 Score" class="bg-slate-800 p-3 rounded-xl border border-slate-700">
                        <input type="number" id="g2" placeholder="Midterm 2 Score" class="bg-slate-800 p-3 rounded-xl border border-slate-700">
                    </div>

                    <button onclick="runAI()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-all transform hover:scale-105">Run AI Assessment</button>
                </div>
            </div>

            <!-- RESULT CARD -->
            <div id="resultArea" class="hidden space-y-6">
                <div id="riskCard" class="p-8 rounded-3xl text-center">
                    <p class="text-sm uppercase tracking-widest opacity-80">Risk Status</p>
                    <h3 id="statusText" class="text-4xl font-black mt-2"></h3>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-6 rounded-3xl text-center">
                        <p class="text-gray-400 text-xs uppercase">Predicted Performance</p>
                        <p id="scoreText" class="text-3xl font-bold text-blue-400 mt-2"></p>
                    </div>
                    <div class="glass p-6 rounded-3xl text-center">
                        <p class="text-gray-400 text-xs uppercase">Volatility (Trend)</p>
                        <p id="volText" class="text-3xl font-bold mt-2"></p>
                    </div>
                </div>

                <div class="glass p-8 rounded-3xl">
                    <h3 class="text-xl font-bold mb-4 flex items-center">📍 Recovery Roadmap</h3>
                    <div id="roadmapContent" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runAI() {
            const data = {
                degree: document.getElementById('degree').value,
                subject: document.getElementById('subject').value,
                attendance: document.getElementById('attendance').value,
                study: document.getElementById('study').value,
                g1: document.getElementById('g1').value || 0,
                g2: document.getElementById('g2').value || 0
            };

            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            const result = await response.json();

            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('statusText').innerText = result.status;
            document.getElementById('scoreText').innerText = result.score + "/100";
            
            const vol = document.getElementById('volText');
            vol.innerText = (result.volatility > 0 ? "+" : "") + result.volatility;
            vol.className = "text-3xl font-bold mt-2 " + (result.volatility >= 0 ? "text-green-400" : "text-red-400");

            const rc = document.getElementById('riskCard');
            if(result.status === 'RED') rc.className = "p-8 rounded-3xl text-center bg-red-900/40 border border-red-500/50 text-red-100";
            else if(result.status === 'YELLOW') rc.className = "p-8 rounded-3xl text-center bg-yellow-900/40 border border-yellow-500/50 text-yellow-100";
            else rc.className = "p-8 rounded-3xl text-center bg-green-900/40 border border-green-500/50 text-green-100";

            const roadmap = document.getElementById('roadmapContent');
            roadmap.innerHTML = result.roadmap.map(step => `
                <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/10">
                    <span class="text-blue-400">👉</span>
                    <span>${step}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
